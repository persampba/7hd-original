.top-headline {
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
    background-color: #f8f9fa;
    border: 1px solid #dee2e6;
    border-radius: 5px;
}

@media (max-width: 768px) {
    .top-headline {
        flex-direction: column;
    }
}
